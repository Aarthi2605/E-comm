<!DOCTYPE html>
<html>
<head>
    <title>Simple E-Commerce Aarthi</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            width: 90%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 120px;
            box-shadow: 0px 0px 5px gray;
        }

        #cartList li {
            list-style: none;
            margin: 10px;
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don't have account? <a href="#" onclick="showSignup()">Sign Up</a></p>
</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" class="container" style="display:none;">
    <h2>Sign Up</h2>
    <input type="text" id="signupUser" placeholder="Username">
    <input type="password" id="signupPass" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- HOME / PRODUCTS -->
<div id="homePage" style="display:none;">
    <h1>🛒 My Store</h1>
    <p id="welcome"></p>
    <button onclick="showCart()">View Cart</button>
    <button onclick="logout()">Logout</button>

    <div class="products">
        <div class="card">
            <h4>Shirt</h4>
            <p>₹500</p>
            <button onclick="addToCart('Shirt',500)">Add</button>
        </div>

        <div class="card">
            <h4>Shoes</h4>
            <p>₹1200</p>
            <button onclick="addToCart('Shoes',1200)">Add</button>
        </div>

        <div class="card">
            <h4>Watch</h4>
            <p>₹2000</p>
            <button onclick="addToCart('Watch',2000)">Add</button>
        </div>
    </div>
</div>

<!-- CART PAGE -->
<div id="cartPage" style="display:none;">
    <h1>Your Cart 🧾</h1>
    <button onclick="showHome()">Back</button>
    <ul id="cartList"></ul>
    <h3 id="total"></h3>
</div>

<script>
    function showSignup() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("signupPage").style.display = "block";
    }

    function showLogin() {
        document.getElementById("signupPage").style.display = "none";
        document.getElementById("loginPage").style.display = "block";
    }

    function signup() {
        let user = document.getElementById("signupUser").value;
        let pass = document.getElementById("signupPass").value;

        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);

        alert("Signup successful!");
        showLogin();
    }

    function login() {
        let user = document.getElementById("loginUser").value;
        let pass = document.getElementById("loginPass").value;

        let storedUser = localStorage.getItem("user");
        let storedPass = localStorage.getItem("pass");

        if (user === storedUser && pass === storedPass) {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("homePage").style.display = "block";

            document.getElementById("welcome").innerText = "Welcome " + user;
        } else {
            alert("Invalid credentials");
        }
    }

    function logout() {
        document.getElementById("homePage").style.display = "none";
        document.getElementById("loginPage").style.display = "block";
    }

    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        cart.push({ name: name, price: price });

        localStorage.setItem("cart", JSON.stringify(cart));

        alert(name + " added!");
    }

    function showCart() {
        document.getElementById("homePage").style.display = "none";
        document.getElementById("cartPage").style.display = "block";
        displayCart();
    }

    function showHome() {
        document.getElementById("cartPage").style.display = "none";
        document.getElementById("homePage").style.display = "block";
    }

    function displayCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let list = document.getElementById("cartList");
        let total = 0;

        list.innerHTML = "";

        cart.forEach((item, index) => {
            total += item.price;

            let li = document.createElement("li");
            li.innerHTML = item.name + " - ₹" + item.price +
                " <button onclick='removeItem(" + index + ")'>Remove</button>";

            list.appendChild(li);
        });

        document.getElementById("total").innerText = "Total: ₹" + total;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        displayCart();
    }
</script>

</body>
</html>
